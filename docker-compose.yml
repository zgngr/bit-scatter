version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bitscatter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitscatter
      POSTGRES_PASSWORD: bitscatter
      POSTGRES_DB: bitscatter_chunks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitscatter -d bitscatter_chunks"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
